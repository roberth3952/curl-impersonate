name: "Build Linux SO"

on:
  push:
    branches:
      - main
      - feature/*
      - bugfix/*
      - chore/*
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-so:
    name: "(x86_64-linux-gnu) Build libcurl-impersonate.so"
    runs-on: ubuntu-latest
    env:
      CC: ${{ github.workspace }}/zigshim/cc
      CXX: ${{ github.workspace }}/zigshim/cxx
      AR: ${{ github.workspace }}/zigshim/ar
      ZIG_FLAGS: -target x86_64-linux-gnu.2.17
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config cmake ninja-build curl autoconf automake libtool golang-go

      - name: Run configure script
        run: |
          set -e
          mkdir -p "${{ runner.temp }}/install"
          ./configure --prefix="${{ runner.temp }}/install" \
                      --host=x86_64-linux-gnu \
                      --with-ca-path=/etc/ssl/certs \
                      --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt

      - name: Build and install
        run: |
          set -e
          make build
          make checkbuild
          make install-strip

      - name: Package Linux shared library
        run: |
          set -e
          archive="${{ runner.temp }}/libcurl-impersonate.x86_64-linux-gnu.tar.gz"
          cd "${{ runner.temp }}/install"
          tar -czf "$archive" lib/libcurl-impersonate.so* include/curl
          echo "release_file_lib=$archive" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libcurl-impersonate.x86_64-linux-gnu
          path: ${{ runner.temp }}/libcurl-impersonate.x86_64-linux-gnu.tar.gz

      - name: Upload release file
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.release_file_lib }}
